<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --red: #e2163a;
    --red-glow: #ff1744;
    --white: #f0e8e0;
    --grey: #888;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 999;
    pointer-events: none;
    opacity: 0.08;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 128px 128px;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(226, 22, 58, 0.03) 40px,
      rgba(226, 22, 58, 0.03) 41px
    );
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 40px 20px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }



  /* Logo tributo (avatar area) */
  .avatar {
    margin-top: 20px;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 3px solid var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    background: var(--black);
    box-shadow: 0 0 30px rgba(226, 22, 58, 0.25);
    overflow: hidden;
    animation: fade-up 0.5s 0.2s ease-out both;
  }

  .avatar img {
    width: 90%;
    height: 90%;
    object-fit: contain;
  }

  /* Bio text */
  .bio-text {
    text-align: center;
    margin-bottom: 28px;
    font-size: 0.9rem;
    color: var(--white);
    line-height: 1.6;
    letter-spacing: 0.3px;
    animation: fade-up 0.5s 0.3s ease-out both;
  }

  .bio-text .bio-location {
    display: block;
    margin-top: 2px;
    font-size: 0.8rem;
    color: var(--grey);
    letter-spacing: 1px;
  }

  /* Links */
  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 20px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    text-decoration: none;
    color: var(--white);
    font-weight: 400;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    animation: fade-up 0.5s ease-out both;
  }

  .link-item:nth-child(1) { animation-delay: 0.35s; }
  .link-item:nth-child(2) { animation-delay: 0.45s; }
  .link-item:nth-child(3) { animation-delay: 0.55s; }
  .link-item:nth-child(4) { animation-delay: 0.65s; }
  .link-item:nth-child(5) { animation-delay: 0.75s; }

  .link-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 3px;
    height: 100%;
    background: var(--red);
    transform: scaleY(0);
    transition: transform 0.3s ease;
  }

  .link-item:hover {
    background: rgba(226, 22, 58, 0.08);
    border-color: rgba(226, 22, 58, 0.3);
    transform: translateX(4px);
  }

  .link-item:hover::before {
    transform: scaleY(1);
  }

  .link-item:hover .link-icon svg {
    fill: var(--red);
  }

  .link-icon {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .link-icon svg {
    width: 20px;
    height: 20px;
    fill: var(--grey);
    transition: fill 0.25s ease;
  }

  .link-label {
    flex: 1;
  }

  .link-sub {
    display: block;
    font-size: 0.75rem;
    color: var(--grey);
    margin-top: 2px;
    letter-spacing: 0;
  }

  .link-arrow {
    font-size: 1.1rem;
    color: var(--grey);
    transition: transform 0.25s ease, color 0.25s ease;
  }

  .link-item:hover .link-arrow {
    transform: translateX(4px);
    color: var(--red);
  }

  /* Footer */
  .footer {
    margin-top: 48px;
    text-align: center;
    animation: fade-up 0.5s 1s ease-out both;
  }

  .footer-text {
    font-family: 'Special Elite', cursive;
    font-size: 0.75rem;
    color: var(--grey);
    letter-spacing: 2px;
    opacity: 0.5;
  }

  /* Animations */
  @keyframes glitch-in {
    0% { opacity: 0; transform: translateY(-10px) skewX(-5deg); }
    60% { opacity: 1; transform: translateY(2px) skewX(1deg); }
    100% { transform: translateY(0) skewX(0); }
  }

  @keyframes bar-expand {
    from { width: 0; opacity: 0; }
    to { width: 60px; opacity: 1; }
  }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .container { padding: 32px 16px 48px; }
  }
</style>
</head>
